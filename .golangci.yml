version: "2"

# golangci-lint configuration for cfgov-cli
# Pinned version: v2.12.2 (also pinned in .github/workflows/ci.yml lint job)

run:
  timeout: 5m

output:
  formats:
    text: {}

linters:
  default: none
  enable:
    # correctness / bug detection
    - errcheck
    - errorlint
    - govet
    - staticcheck
    - ineffassign
    - unused
    - nilerr
    - noctx
    - bodyclose
    - rowserrcheck
    - sqlclosecheck
    - tparallel
    - wastedassign
    - exhaustive
    - predeclared
    - copyloopvar
    - forcetypeassert

    # style / readability
    - gocritic
    - revive
    - misspell
    - unconvert
    - unparam
    - whitespace

    # complexity / structure
    - gocyclo
    - nestif
    - dupl
    - prealloc
    - nakedret

    # security
    - gosec
    - gomodguard_v2
    - gomoddirectives

    # logging
    - sloglint

    # contract enforcement
    - forbidigo

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
      # Console/status writes cannot be usefully recovered; real non-print errors remain checked.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    gocyclo:
      min-complexity: 15
    nestif:
      min-complexity: 5
    dupl:
      threshold: 100
    misspell:
      locale: US
    forbidigo:
      analyze-types: true
      forbid:
        - pattern: '^fmt\.Errorf$'
          msg: "in cmd/, build errors with apperrors.New(code, msg, cause); bare fmt.Errorf falls back to LOCAL_IO_ERROR (exit 6) and breaks the exit-code contract"
        - pattern: '^errors\.New$'
          msg: "in cmd/, use apperrors.New(code, msg, nil) instead of errors.New"
    gosec:
      excludes:
        - G104  # unhandled errors — covered by errcheck with finer control
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: empty-block
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: unused-parameter
          disabled: true   # often required by interface signatures; case-by-case via //nolint
        - name: var-declaration
        - name: var-naming

  exclusions:
    rules:
      # Test files allow longer functions and table-driven data
      - path: _test\.go
        linters:
          - gocyclo
          - dupl
          - gosec
          - errcheck
          - forcetypeassert
      # Cobra command construction is long by nature
      - path: cmd/.*\.go
        linters:
          - gocyclo
        text: "cyclomatic complexity .* of func .*new.*Cmd"
      # forbidigo only governs the user-facing command layer (cmd/)
      - path: '(^|/)(internal|pkg|skills)/'
        linters:
          - forbidigo
      - path: _test\.go
        linters:
          - forbidigo

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/JiangHe12/cfgov-cli

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
